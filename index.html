<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacature-tracker — Arjen</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root { color-scheme: dark light; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 24px 16px 64px; line-height: 1.5; }
  h1 { font-size: 1.5rem; }
  h2 { font-size: 1.1rem; margin-top: 2.5rem; border-bottom: 1px solid #8883; padding-bottom: 6px; }
  .meta { color: #888; font-size: 0.9rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.92rem; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #8883; vertical-align: top; }
  th { font-weight: 600; }
  tr:hover { background: #8881; }
  a.job-link { font-weight: 600; }
  .empty { color: #888; font-style: italic; padding: 16px 0; }
  #subscribeBtn { background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; margin-top: 12px; }
  #subscribeBtn:disabled { background: #6b7280; cursor: default; }
  #subStatus { margin-top: 8px; font-size: 0.85rem; color: #888; }
  details summary { cursor: pointer; }
</style>
</head>
<body>
  <h1>Vacature-tracker</h1>
  <p class="meta">Laatst bijgewerkt: <span id="lastUpdated">–</span></p>

  <button id="installBtn" style="display:none;">App installeren</button>
  <button id="subscribeBtn">Meldingen aanzetten (elke ochtend 09:00)</button>
  <div id="subStatus"></div>
  <div id="subHint" style="display:none; margin-top: 6px; font-size: 0.85rem; color: #f59e0b;">
    Toestemming voor meldingen staat op "geweigerd" in je browser/toestel — dat kan deze knop niet zelf herstellen.
    Zet meldingen voor deze site aan via je browser-/systeeminstellingen en klik daarna nogmaals.
  </div>

  <h2>Actief</h2>
  <div id="activeTable"></div>

  <h2>Niet controleerbaar</h2>
  <div id="notControlledTable"></div>

  <details>
    <summary><h2 style="display:inline;">Archief</h2></summary>
    <div id="archiveTable"></div>
  </details>

<script>
const VAPID_PUBLIC_KEY = "BJaeAvCGohpg7Q2DHrdqWZnvp3nCWE0T5jWispamQAkVsRPJlJel1GxRcUTu3EmGcLrS1EbZBB9Du5BBo86sw0c";
const WORKER_URL = "https://vacature-tracker-subscribe.arjen-ravestein.workers.dev";

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function loadData() {
  const res = await fetch("data.json", { cache: "no-store" });
  const data = await res.json();

  document.getElementById("lastUpdated").textContent = new Date(data.lastUpdated).toLocaleString("nl-NL");

  renderActive(data.active);
  renderNotControlled(data.notControlled);
  renderArchive(data.archive);
}

function renderActive(rows) {
  const el = document.getElementById("activeTable");
  if (!rows || rows.length === 0) {
    el.innerHTML = '<p class="empty">Momenteel geen actieve matches.</p>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>Bedrijf</th><th>Vacature</th><th>Beschrijving</th><th>Waarom fit</th><th>Gesolliciteerd</th></tr>
    ${rows.map(r => `<tr>
      <td>${escapeHtml(r.bedrijf)}</td>
      <td><a class="job-link" href="${escapeHtml(r.link)}" target="_blank" rel="noopener">${escapeHtml(r.titel)}</a></td>
      <td>${escapeHtml(r.beschrijving || "")}</td>
      <td>${escapeHtml(r.fit || "")}</td>
      <td>${escapeHtml(r.gesolliciteerd || "Nee")}</td>
    </tr>`).join("")}
  </table>`;
}

function renderNotControlled(rows) {
  const el = document.getElementById("notControlledTable");
  if (!rows || rows.length === 0) {
    el.innerHTML = '<p class="empty">Alles kon deze check gecontroleerd worden.</p>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>Bedrijf</th><th>Vacature/onderwerp</th><th>Reden</th></tr>
    ${rows.map(r => `<tr>
      <td>${escapeHtml(r.bedrijf)}</td>
      <td>${r.link ? `<a href="${escapeHtml(r.link)}" target="_blank" rel="noopener">${escapeHtml(r.titel)}</a>` : escapeHtml(r.titel)}</td>
      <td>${escapeHtml(r.reden)}</td>
    </tr>`).join("")}
  </table>`;
}

function renderArchive(rows) {
  const el = document.getElementById("archiveTable");
  if (!rows || rows.length === 0) {
    el.innerHTML = '<p class="empty">Archief is leeg.</p>';
    return;
  }
  el.innerHTML = `<table>
    <tr><th>Bedrijf</th><th>Vacature</th><th>Reden</th><th>Datum</th></tr>
    ${rows.map(r => `<tr>
      <td>${escapeHtml(r.bedrijf)}</td>
      <td>${escapeHtml(r.titel)}</td>
      <td>${escapeHtml(r.reden)}</td>
      <td>${escapeHtml(r.datum)}</td>
    </tr>`).join("")}
  </table>`;
}

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function setupSubscribe() {
  const btn = document.getElementById("subscribeBtn");
  const status = document.getElementById("subStatus");
  const hint = document.getElementById("subHint");

  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    btn.disabled = true;
    status.textContent = "Pushmeldingen worden niet ondersteund in deze browser.";
    return;
  }

  const reg = await navigator.serviceWorker.register("sw.js");

  // Toggle button: "Meldingen aanzetten" <-> "Meldingen uitzetten". Uitzetten
  // ruimt de subscription zowel lokaal (unsubscribe) als server-side
  // (subscriptions.json via de Cloudflare Worker) op, zodat een dood/verlopen
  // abonnement niet blijft hangen en je gewoon opnieuw kunt aanmelden zonder
  // eerst met OS-instellingen te hoeven vechten.
  async function refreshUi() {
    const existing = await reg.pushManager.getSubscription();
    hint.style.display = "none";
    if (existing) {
      btn.textContent = "Meldingen uitzetten";
      btn.disabled = false;
      status.textContent = "Je ontvangt elke ochtend om 09:00 een melding als er een update is.";
    } else {
      btn.textContent = "Meldingen aanzetten (elke ochtend 09:00)";
      btn.disabled = false;
      if (typeof Notification !== "undefined" && Notification.permission === "denied") {
        hint.style.display = "block";
        status.textContent = "";
      } else {
        status.textContent = "";
      }
    }
  }

  await refreshUi();

  btn.addEventListener("click", async () => {
    btn.disabled = true;
    const existing = await reg.pushManager.getSubscription();

    if (existing) {
      status.textContent = "Bezig met uitzetten...";
      try {
        const endpoint = existing.endpoint;
        await existing.unsubscribe();
        await fetch(WORKER_URL + "/unsubscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint })
        });
        status.textContent = "Meldingen zijn uitgezet.";
      } catch (err) {
        status.textContent = "Uitzetten mislukt: " + err.message;
      }
      await refreshUi();
      return;
    }

    status.textContent = "Bezig met aanmelden...";
    try {
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        status.textContent = "Toestemming voor meldingen geweigerd.";
        await refreshUi();
        return;
      }
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      const res = await fetch(WORKER_URL + "/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub)
      });
      if (!res.ok) throw new Error("Worker gaf status " + res.status);
      status.textContent = "Gelukt — je ontvangt elke ochtend om 09:00 een melding.";
    } catch (err) {
      status.textContent = "Aanmelden mislukt: " + err.message;
    }
    await refreshUi();
  });
}

// Custom "Install app" button — without a real manifest+icons the browser
// never fires beforeinstallprompt, so this stays hidden until Chrome decides
// the site is installable. Installing first makes the later notification
// permission request far more likely to show the real native prompt instead
// of Chrome's silent "quiet UI" for low-trust/uninstalled sites.
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (event) => {
  event.preventDefault();
  deferredInstallPrompt = event;
  document.getElementById("installBtn").style.display = "inline-block";
});
document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById("installBtn").style.display = "none";
});

loadData();
setupSubscribe();
</script>
</body>
</html>
